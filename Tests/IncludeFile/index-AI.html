<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Home Page</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0;">

    <div id="header-placeholder"></div>

    <div style="padding: 20px;">
        <h1>Welcome to my Homepage!</h1>
        <p>This page loaded the header from an entirely separate file.</p>
    </div>

    <script>
        // 1. Fetch the file
        fetch('header.html')
            // 2. Convert the response to raw text
            .then(response => response.text())
            // 3. Inject it into the div
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            // 4. Catch any errors (helpful for debugging)
            .catch(error => console.error('Error loading header:', error));
    </script>

</body>
</html>
