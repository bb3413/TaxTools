<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>JS Scope Demonstration</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        code { background: #eee; padding: 2px 5px; border-radius: 4px; }
        #output { background: #282c34; color: #61dafb; padding: 15px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="container">
        <h2>JavaScript <code>let</code> Scope Demo</h2>
        <p>Check the box below to see how global and local variables behave.</p>
        <button onClick="runScopeDemo()">Run Demo</button>
        
        <h3>Console Output:</h3>
        <div id="output">Click the button to see scope in action...</div>
    </div>

    <script>
        // 1. Global Variable
        let myValue = "I am GLOBAL";

        function runScopeDemo() {
            const display = document.getElementById('output');
            display.innerHTML = ""; // Clear previous

            display.innerHTML += `Before function logic: ${myValue}\n`;

            // 2. Function/Local Variable
            // This 'shadows' the global variable inside this block
            let myValue = "I am LOCAL (inside the function)";
            
            display.innerHTML += `Inside function logic: ${myValue}\n`;

            // 3. Block Scope Example
            if (true) {
                let myValue = "I am even deeper (BLOCK scope)";
                display.innerHTML += `Inside IF block: ${myValue}\n`;
            }

            display.innerHTML += `Back in function scope: ${myValue}\n`;
            
            // Note: We use 'window.myValue' to force access to the global one 
            // since the local one is currently shadowing it.
            // However, because we used 'let' at the top level, it isn't 
            // attached to 'window'. To see the global one again, we'd 
            // usually look at it outside this function.
        }
    </script>
</body>
</html>
