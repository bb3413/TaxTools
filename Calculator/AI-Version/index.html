<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Pro String Calculator</title>
	<link rel="stylesheet" href="style.css" />
	<script src="script.js" defer></script>
</head>
<body>

	<div class="calculator">
		<input type="text" id="display" class="display" value="0" autofocus inputmode="none" autocomplete="off" />
		
		<div class="buttons">
			<button onClick="clearDisplay()" class="btn-clear">AC</button>
			<button onClick="deleteAtCursor()" class="btn-del">DEL</button>
			<button onClick="appendToDisplay('(')">(</button>
			<button onClick="appendToDisplay(')')">)</button>
			
			<button onClick="appendToDisplay('7')">7</button>
			<button onClick="appendToDisplay('8')">8</button>
			<button onClick="appendToDisplay('9')">9</button>
			<button onClick="appendToDisplay('/')" class="operator">÷</button>
			
			<button onClick="appendToDisplay('4')">4</button>
			<button onClick="appendToDisplay('5')">5</button>
			<button onClick="appendToDisplay('6')">6</button>
			<button onClick="appendToDisplay('*')" class="operator">×</button>
			
			<button onClick="appendToDisplay('1')">1</button>
			<button onClick="appendToDisplay('2')">2</button>
			<button onClick="appendToDisplay('3')">3</button>
			<button onClick="appendToDisplay('-')" class="operator">−</button>
			
			<button onClick="appendToDisplay('0')">0</button>
			<button onClick="appendToDisplay('.')">.</button>
			<button onClick="calculateResult()" class="btn-equal">=</button>
			<button onClick="appendToDisplay('+')" class="operator">+</button>
		</div>
	</div>
</body>
</html>
