<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="stylesheet" href="../Library/TaxTools/TaxTools.css" />
		<link rel="stylesheet" href="Calculator.css" />

		<script defer src="../Library/Utilities/EvalExpression.js"></script>
		<script defer src="Calculator.js"></script>

		<title>Simple Math Calculator</title>
	</head>

	<body>
		<div class="calculator">
			<input type="text" id="display" class="display" value="0" autofocus inputmode="none" autocomplete="off" />
		
			<div class="buttons">
				<button onClick="clearDisplay()">CLR</button>
				<button onClick="deleteAtCursor()">DEL</button>
				<button onClick="appendToDisplay('(')">(</button>
				<button onClick="appendToDisplay(')')">)</button>
			
				<button onClick="appendToDisplay('7')">7</button>
				<button onClick="appendToDisplay('8')">8</button>
				<button onClick="appendToDisplay('9')">9</button>
				<button onClick="appendToDisplay('/')" class="operator">/</button>
			
				<button onClick="appendToDisplay('4')">4</button>
				<button onClick="appendToDisplay('5')">5</button>
				<button onClick="appendToDisplay('6')">6</button>
				<button onClick="appendToDisplay('*')" class="operator">*</button>
			
				<button onClick="appendToDisplay('1')">1</button>
				<button onClick="appendToDisplay('2')">2</button>
				<button onClick="appendToDisplay('3')">3</button>
				<button onClick="appendToDisplay('-')" class="operator">−</button>
			
				<button onClick="appendToDisplay('0')">0</button>
				<button onClick="appendToDisplay('.')">.</button>
				<button onClick="calculateResult()" class="operator">=</button>
				<button onClick="appendToDisplay("+")" class="operator">+</button>
			</div>
		</div>
	</body>
</html>
