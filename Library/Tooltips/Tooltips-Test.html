

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Vanilla JS Tooltips</title>
    <style>
        body {
            font-family: sans-serif;
            height: 200vh; /* Adds scroll so you can test positioning */
            padding: 50px;
            background: #f4f4f9;
        }

        .trigger {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border-radius: 4px;
            cursor: help;
            margin-right: 20px;
        }

        /* Tooltip Base Styles */
        .tooltip {
            position: absolute;
            background: #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            width: 200px; /* Fixed width for math testing */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            
            /* The "Fade" logic handled by CSS */
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-out;
            transform: translateY(5px); /* Small slide effect */
            pointer-events: none;
			
			background-color:	Beige;
			color:				#000;
        }

        /* The "Active" state */
        .tooltip.is-active {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        /* Positioning Helpers */
        .right-aligned { float: right; }
		
		
		.tooltip h3 {
			margin-top:			0;
		}

		.tooltip h4 {
			font-size:			16px;
			margin-top:			0;
			margin-bottom:		2px;
		}
    </style>
</head>
<body>

    <h2>Smart Tooltip Demo</h2>
    <p>Hover over the buttons. One is in the middle, one is on the far right edge.</p>

    <div class="trigger" tooltipid="#tip1">Hover Me (Normal)</div>
    <div id="tip1" class="tooltip">
		<h2>Heading</h2>
		<p>This is a standard tooltip appearing above the button.</p>
	</div>

    <div class="trigger right-aligned" tooltipid="#tip2">Hover Me (Edge)</div>
    <div id="tip2" class="tooltip">I am a smart tooltip! I detected the screen edge and shifted left so I wouldn"t get cut off.</div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const triggers = document.querySelectorAll(".trigger");

            triggers.forEach(trigger => {
                trigger.addEventListener("mouseenter", () => {
                    const tipId = trigger.getAttribute("tooltipID");
                    const tip = document.querySelector(tipId);
                    if (!tip) return;

                    // 1. Get Measurements
                    const triggerRect = trigger.getBoundingClientRect();
                    const screenW = window.innerWidth;
                    const scrollY = window.scrollY;

                    // We show it momentarily at opacity 0 to get its height/width
                    tip.style.display = "block"; 
                    const tipRect = tip.getBoundingClientRect();

                    // 2. Vertical Logic (Flip if hits top)
                    let ttTop = (triggerRect.top + scrollY) - tipRect.height - 15;
                    if (ttTop < scrollY + 10) {
                        ttTop = (triggerRect.bottom + scrollY) + 15;
                    }

                    // 3. Horizontal Logic (Shift if hits right edge)
                    let ttLeft = triggerRect.left;
                    const tipRightEdge = ttLeft + tipRect.width;

                    if (tipRightEdge > screenW) {
                        const overflow = tipRightEdge - screenW;
                        ttLeft = ttLeft - overflow - 20; // 20px padding from edge
                    }

                    // 4. Apply and Activate
                    tip.style.top = `${ttTop}px`;
                    tip.style.left = `${ttLeft}px`;
                    tip.classList.add("is-active");
                });

                trigger.addEventListener("mouseleave", () => {
                    const tipId = trigger.getAttribute("tooltipID");
                    const tip = document.querySelector(tipId);
                    if (tip) tip.classList.remove("is-active");
                });
            });
        });
    </script>
</body>
</html>
